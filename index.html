<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 核心互動介面</title>
    <style>
        :root {
            --primary-bg: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85);
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--primary-bg); color: var(--text-color);
            font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        #settings-panel {
            position: absolute; top: 10px; width: 90%; background: var(--panel-bg);
            border: 1px solid #30363d; border-radius: 12px; padding: 15px; box-sizing: border-box;
            z-index: 100; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        #settings-panel.hidden { transform: translateY(-150%); opacity: 0; pointer-events: none; }
        .input-group { margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 8px; box-sizing: border-box; border-radius: 6px;
            border: 1px solid #30363d; background: #010409; color: white;
        }
        .btn-row { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer;
        }
        
        #toggle-settings-btn {
            position: absolute; top: 15px; right: 15px; background: transparent;
            border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 5px 10px; border-radius: 6px; z-index: 99; cursor: pointer;
        }

        #display-area { flex: 1; width: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        #particle-canvas { position: absolute; z-index: 10; pointer-events: none; }

        #character-container {
            position: absolute; opacity: 0; display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease; z-index: 20; animation: float 4s ease-in-out infinite; 
        }

        .character-body {
            width: 120px; height: 120px; background: #238636; border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center; padding: 0 20px; position: relative;
        }
        
        .eye { width: 25px; height: 40px; background: #fff; border-radius: 50%; animation: blink 3s infinite; }
        .hand {
            width: 30px; height: 30px; background: #2ea043; border-radius: 50%;
            position: absolute; bottom: -15px; animation: wave 2s ease-in-out infinite alternate;
        }
        .hand.left { left: -10px; transform-origin: top right; }
        .hand.right { right: -10px; transform-origin: top left; }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes wave { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }

        #chat-area {
            width: 100%; height: 250px; background: #010409; border-top: 1px solid #30363d;
            display: flex; flex-direction: column;
        }
        #output-log { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; line-height: 1.5; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #30363d; }
        #input-area input {
            flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #30363d;
            background: var(--primary-bg); color: white; margin-right: 10px;
        }
    </style>
</head>
<body>

    <button id="toggle-settings-btn">⚙️ 設定</button>

    <div id="settings-panel">
        <h3 style="margin-top:0;">核心設定</h3>
        <div class="input-group">
            <input type="password" id="api-key-input" placeholder="填入 Gemini API Key">
        </div>
        <div class="btn-row">
            <button onclick="saveSettings()">儲存</button>
            <button onclick="triggerAssembleEffect(true)" style="background:#238636; color:white;">啟動核心(播音效)</button>
        </div>
    </div>

    <div id="display-area">
        <canvas id="particle-canvas" width="300" height="300"></canvas>
        <div id="character-container">
            <div class="character-body">
                <div class="eye"></div><div class="eye"></div>
                <div class="hand left"></div><div class="hand right"></div>
            </div>
            </div>
    </div>

    <div id="chat-area">
        <div id="output-log">系統初始化完成，等待指令...</div>
        <div id="input-area">
            <input type="text" id="prompt-input" placeholder="輸入訊息...">
            <button onclick="sendToGemini()">發送</button>
        </div>
    </div>

    <script>
        const settingsPanel = document.getElementById('settings-panel');
        const apiKeyInput = document.getElementById('api-key-input');
        const outputLog = document.getElementById('output-log');

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                settingsPanel.classList.add('hidden');
                // 首次載入因瀏覽器政策無法自動播音效，故帶入 false
                triggerAssembleEffect(false); 
            }
        };

        document.getElementById('toggle-settings-btn').addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
        });

        function saveSettings() {
            localStorage.setItem('gemini_api_key', apiKeyInput.value);
            settingsPanel.classList.add('hidden');
            logMessage("系統提示：API 設定已儲存。");
            triggerAssembleEffect(true); // 點擊儲存時觸發音效與動畫
        }

        function logMessage(msg) {
            outputLog.innerHTML += `<div>${msg}</div>`;
            outputLog.scrollTop = outputLog.scrollHeight;
        }

        function handleImageError() {
            logMessage("<span style='color:red'>錯誤：照片載入失敗 (可能是 503 或路徑錯誤)，請檢查檔案位置。</span>");
        }

        // ==========================================
        // 純程式碼合成「科技音效」 (Web Audio API)
        // ==========================================
        function playSciFiSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // 產生兩個振盪器做出和聲
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc1.type = 'sawtooth'; // 鋸齒波，較有機械感
                osc2.type = 'square';   // 方波，經典電子聲

                osc1.connect(gainNode);
                osc2.connect(gainNode);
                gainNode.connect(ctx.destination);

                // 頻率掃描：從低頻快速上升，模擬啟動感
                osc1.frequency.setValueAtTime(50, ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 1.5);
                
                osc2.frequency.setValueAtTime(50, ctx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 1.5);

                // 音量控制：淡入後淡出
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.2); // 音量設定 0.08 避免刺耳
                gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);

                osc1.start(); osc2.start();
                osc1.stop(ctx.currentTime + 2); osc2.stop(ctx.currentTime + 2);
            } catch (e) {
                console.log("瀏覽器阻擋或不支援音效播放");
            }
        }

        // ==========================================
        // 粒子動畫核心
        // ==========================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const charContainer = document.getElementById('character-container');
        let animationFrameId;

        function triggerAssembleEffect(playSound = false) {
            if (playSound) playSciFiSound();

            cancelAnimationFrame(animationFrameId);
            charContainer.style.opacity = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let particles = [];

            // 繪製假像素來源 (如果有實體圖片，這裡要換成 drawImage 取像素)
            ctx.fillStyle = '#238636';
            ctx.beginPath(); ctx.roundRect(90, 90, 120, 120, 30); ctx.fill();
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            ctx.clearRect(0, 0, canvas.width, canvas.height); 

            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    if (data[(y * canvas.width + x) * 4 + 3] > 128) {
                        particles.push({
                            x: x, y: canvas.height + 50 + Math.random() * 200,
                            targetX: x, targetY: y,
                            speed: 0.04 + Math.random() * 0.05,
                            color: `rgba(88, 166, 255, ${Math.random() * 0.8 + 0.2})`
                        });
                    }
                }
            }

            let isAssembling = true;
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allReached = true;

                particles.forEach(p => {
                    p.y += (p.targetY - p.y) * p.speed;
                    p.x += (p.targetX - p.x) * p.speed;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 2.5, 2.5); // 稍微放大粒子
                    if (Math.abs(p.targetY - p.y) > 1.5) allReached = false;
                });

                if (!allReached) {
                    animationFrameId = requestAnimationFrame(animateParticles);
                } else if (isAssembling) {
                    isAssembling = false;
                    setTimeout(() => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        charContainer.style.opacity = 1;
                    }, 200);
                }
            }
            animateParticles();
        }

        // ==========================================
        // Gemini API 連線與 503 防護
        // ==========================================
        async function sendToGemini() {
            const inputField = document.getElementById('prompt-input');
            const prompt = inputField.value.trim();
            const apiKey = localStorage.getItem('gemini_api_key');

            if (!apiKey) {
                logMessage("<span style='color:red'>錯誤：請先開啟設定填寫 API Key。</span>");
                settingsPanel.classList.remove('hidden'); return;
            }
            if (!prompt) return;

            logMessage(`<b>使用者：</b> ${prompt}`);
            inputField.value = '';
            
            let attempts = 0;
            const maxRetries = 2;

            while (attempts <= maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (!response.ok) {
                        // 針對 503 特別擷取
                        if (response.status === 503) throw new Error("503 伺服器忙碌");
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    logMessage(`<span style='color:var(--accent-color)'><b>AI：</b> ${aiResponse}</span>`);
                    return; 

                } catch (error) {
                    attempts++;
                    console.error("API 連線錯誤", error);
                    if (attempts > maxRetries) {
                        logMessage(`<span style='color:red'>系統錯誤：${error.message}。伺服器目前無法回應，請稍後再試。</span>`);
                    } else {
                        // 如果是 503，退避時間拉長 (2秒 -> 4秒)
                        const waitTime = attempts * 2000;
                        logMessage(`<span style='color:orange'>${error.message}，正在嘗試重新連線... (第 ${attempts} 次)</span>`);
                        await new Promise(resolve => setTimeout(resolve, waitTime));
                    }
                }
            }
        }
    </script>
</body>
</html>
