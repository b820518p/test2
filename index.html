<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 核心互動介面</title>
    <style>
        :root {
            --primary-bg: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85);
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden; /* 防止手機滾動 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 設定面板 (可隱藏) --- */
        #settings-panel {
            position: absolute;
            top: 10px;
            width: 90%;
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        #settings-panel.hidden {
            transform: translateY(-150%);
            opacity: 0;
            pointer-events: none;
        }
        .input-group { margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 8px; box-sizing: border-box;
            border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white;
        }
        .btn-row { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer;
        }
        
        /* 呼叫設定的懸浮按鈕 */
        #toggle-settings-btn {
            position: absolute; top: 15px; right: 15px;
            background: transparent; border: 1px solid var(--accent-color);
            color: var(--accent-color); padding: 5px 10px; border-radius: 6px;
            z-index: 99; cursor: pointer;
        }

        /* --- 視覺顯示區 --- */
        #display-area {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 粒子特效 Canvas */
        #particle-canvas {
            position: absolute;
            z-index: 10;
        }

        /* 動畫人物容器 (粒子動畫結束後顯示) */
        #character-container {
            position: absolute;
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
            z-index: 20;
            /* 身體呼吸浮動特效 */
            animation: float 4s ease-in-out infinite; 
        }

        /* 這裡用 CSS 簡單畫出臉部與眼睛作為示範，你之後可替換成你的圖片 */
        .character-body {
            width: 120px; height: 120px;
            background: #238636; border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center; padding: 0 20px;
            position: relative;
        }
        
        .eye {
            width: 25px; height: 40px;
            background: #fff; border-radius: 50%;
            /* 眼睛眨動特效 */
            animation: blink 3s infinite;
        }

        .hand {
            width: 30px; height: 30px; background: #2ea043; border-radius: 50%;
            position: absolute; bottom: -15px;
            /* 手部輕微晃動 */
            animation: wave 2s ease-in-out infinite alternate;
        }
        .hand.left { left: -10px; transform-origin: top right; }
        .hand.right { right: -10px; transform-origin: top left; }

        /* 動態 Keyframes */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        @keyframes wave {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* --- 互動對話區 --- */
        #chat-area {
            width: 100%; height: 250px; background: #010409;
            border-top: 1px solid #30363d; display: flex; flex-direction: column;
        }
        #output-log {
            flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; line-height: 1.5;
        }
        #input-area {
            display: flex; padding: 10px; border-top: 1px solid #30363d;
        }
        #input-area input {
            flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #30363d;
            background: var(--primary-bg); color: white; margin-right: 10px;
        }
    </style>
</head>
<body>

    <button id="toggle-settings-btn">⚙️ 設定</button>

    <div id="settings-panel">
        <h3 style="margin-top:0;">核心設定</h3>
        <div class="input-group">
            <input type="password" id="api-key-input" placeholder="填入 Gemini API Key">
        </div>
        <div class="btn-row">
            <button onclick="saveSettings()">儲存並隱藏</button>
            <button onclick="triggerAssembleEffect()" style="background:#238636; color:white;">重新載入核心</button>
        </div>
    </div>

    <div id="display-area">
        <canvas id="particle-canvas" width="300" height="300"></canvas>
        
        <div id="character-container">
            <div class="character-body">
                <div class="eye"></div>
                <div class="eye"></div>
                <div class="hand left"></div>
                <div class="hand right"></div>
            </div>
            </div>
    </div>

    <div id="chat-area">
        <div id="output-log">系統初始化完成，等待指令...</div>
        <div id="input-area">
            <input type="text" id="prompt-input" placeholder="輸入訊息...">
            <button onclick="sendToGemini()">發送</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. UI 與設定邏輯
        // ==========================================
        const settingsPanel = document.getElementById('settings-panel');
        const apiKeyInput = document.getElementById('api-key-input');
        const outputLog = document.getElementById('output-log');

        // 載入儲存的 API Key
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                settingsPanel.classList.add('hidden'); // 有金鑰就預設隱藏
                triggerAssembleEffect(); // 觸發組裝動畫
            }
        };

        document.getElementById('toggle-settings-btn').addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
        });

        function saveSettings() {
            localStorage.setItem('gemini_api_key', apiKeyInput.value);
            settingsPanel.classList.add('hidden');
            logMessage("系統提示：API 設定已儲存。");
        }

        function logMessage(msg) {
            outputLog.innerHTML += `<div>${msg}</div>`;
            outputLog.scrollTop = outputLog.scrollHeight;
        }

        // ==========================================
        // 2. 科技粒子由下往上組裝特效 (Canvas)
        // ==========================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const charContainer = document.getElementById('character-container');
        let particles = [];
        let animationFrameId;

        function triggerAssembleEffect() {
            // 重置狀態
            cancelAnimationFrame(animationFrameId);
            charContainer.style.opacity = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];

            // 為了示範，我們先在隱藏的 canvas 上畫一個圖形當作「像素來源」
            // 實戰中你可以用 ctx.drawImage(img, 0, 0) 畫上你的 PNG 圖片
            ctx.fillStyle = '#238636';
            ctx.beginPath();
            ctx.roundRect(90, 90, 120, 120, 30);
            ctx.fill();
            
            // 獲取像素資料
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // 清空準備畫粒子

            // 抽樣像素轉換為粒子 (每 4px 抽樣一次以提升效能)
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    const alpha = data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        particles.push({
                            x: x,
                            y: canvas.height + Math.random() * 200, // 從底部以外的地方開始
                            targetX: x,
                            targetY: y,
                            speed: 0.03 + Math.random() * 0.04, // 亂數速度造成科幻感
                            color: `rgba(88, 166, 255, ${Math.random() * 0.8 + 0.2})` // 科技藍
                        });
                    }
                }
            }

            // 動畫迴圈 (約 1~3 秒完成)
            let isAssembling = true;
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allReached = true;

                particles.forEach(p => {
                    // 緩動演算法：位置 = 位置 + (目標 - 位置) * 速度
                    p.y += (p.targetY - p.y) * p.speed;
                    p.x += (p.targetX - p.x) * p.speed;

                    // 畫出粒子
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 2, 2);

                    // 判斷是否抵達目標 (誤差小於 1px)
                    if (Math.abs(p.targetY - p.y) > 1) {
                        allReached = false;
                    }
                });

                if (!allReached) {
                    animationFrameId = requestAnimationFrame(animateParticles);
                } else if (isAssembling) {
                    // 組裝完成，隱藏 Canvas，顯示 CSS 動畫人物
                    isAssembling = false;
                    setTimeout(() => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        charContainer.style.opacity = 1;
                        logMessage("系統提示：核心載入完成。");
                    }, 300);
                }
            }
            animateParticles();
        }

        // ==========================================
        // 3. Gemini API 核心連線異常與重試機制
        // ==========================================
        async function sendToGemini() {
            const inputField = document.getElementById('prompt-input');
            const prompt = inputField.value.trim();
            const apiKey = localStorage.getItem('gemini_api_key');

            if (!apiKey) {
                logMessage("<span style='color:red'>錯誤：請先開啟設定填寫 API Key。</span>");
                settingsPanel.classList.remove('hidden');
                return;
            }
            if (!prompt) return;

            logMessage(`<b>使用者：</b> ${prompt}`);
            inputField.value = '';
            
            let attempts = 0;
            const maxRetries = 2; // 連線異常時最多重試 2 次

            while (attempts <= maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP Error: ${response.status}`);
                    }

                    const data = await response.json();
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    logMessage(`<span style='color:var(--accent-color)'><b>AI：</b> ${aiResponse}</span>`);
                    return; // 成功則跳出迴圈

                } catch (error) {
                    attempts++;
                    console.error("連線錯誤", error);
                    if (attempts > maxRetries) {
                        logMessage(`<span style='color:red'>系統錯誤：連線異常 (${error.message})。請檢查網路或 API Key 額度。</span>`);
                    } else {
                        logMessage(`<span style='color:orange'>連線異常，正在嘗試重新連線 (第 ${attempts} 次)...</span>`);
                        await new Promise(resolve => setTimeout(resolve, 1500)); // 暫停 1.5 秒再重試
                    }
                }
            }
        }
    </script>
</body>
</html>
