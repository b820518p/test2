<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息艙 - 科幻方塊電影版</title>
    <style>
        :root { --p: 0; }

        html, body {
            background-color: #000000 !important; color: #ffffff;
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace; touch-action: none;
        }

        /* 全息投影容器 */
        #hologram-container { position: relative; width: 340px; height: 340px; transform-style: preserve-3d; margin-bottom: 80px; }
        
        .face-container {
            position: absolute; width: 150px; height: 150px;
            top: 50%; left: 50%; margin-top: -75px; margin-left: -75px;
        }

        /* 梯形裁切層 */
        .holo-wrapper {
            width: 100%; height: 100%;
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            position: relative;
        }

        /* 圖片本體 */
        .holo-image {
            width: 100%; height: 100%;
            background-image: var(--bg-img);
            background-size: contain; background-repeat: no-repeat; background-position: center bottom;
            position: relative;
            clip-path: inset(calc(100% - (var(--p) * 1%)) 0 0 0);
            filter: brightness(1.2);
            z-index: 1;
        }

        /* 💡 終極修復：全息立體字幕 (放在 holo-wrapper 內部底部，保證絕對顯示) */
        .holo-sub {
            position: absolute; bottom: 5px; left: 0; width: 100%;
            text-align: center; color: #00d2ff; font-size: 13px; font-weight: bold;
            text-shadow: 0 0 4px #00d2ff, 0 0 8px #000; z-index: 20;
            pointer-events: none; word-wrap: break-word;
        }

        /* 科技藍色掃描線 */
        .scan-line {
            position: absolute; left: -10%; width: 120%; height: 2px;
            background: linear-gradient(90deg, transparent, #00d2ff, #fff, #00d2ff, transparent);
            box-shadow: 0 0 15px #00d2ff, 0 0 5px #fff;
            top: calc(100% - (var(--p) * 1%));
            display: none; z-index: 5; pointer-events: none;
        }

        .scanning .scan-line { display: block; }
        .scanning .holo-image { animation: tech-flicker 0.15s infinite; }
        @keyframes tech-flicker {
            0%, 100% { opacity: 1; filter: brightness(1.2); }
            50% { opacity: 0.7; filter: brightness(2); }
        }

        /* 平時呼吸 */
        .idle-breathe { animation: float3D 4s infinite ease-in-out; }
        @keyframes float3D {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        /* 💡 電影級科技像素方塊化特效 (移除紅藍，改為純淨青光與數位方塊錯位) */
        .is-talking {
            image-rendering: pixelated; /* 強制影像產生顆粒科技感 */
            animation: sci-fi-talk 0.15s infinite steps(2);
        }
        .is-talking::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-img);
            background-size: contain; background-repeat: no-repeat; background-position: center bottom;
            filter: brightness(1.6) drop-shadow(0 0 8px #00d2ff); /* 純淨科技青藍光 */
            opacity: 0.8; z-index: 2;
            animation: block-glitch 0.2s infinite steps(3);
        }

        @keyframes sci-fi-talk {
            0% { transform: scale(1); filter: brightness(1.2); }
            50% { transform: scale(1.02); filter: brightness(1.4); }
        }
        @keyframes block-glitch {
            /* 利用水平 inset 裁切出方塊，製造數位資料讀取時的水平錯位感 */
            0% { clip-path: inset(10% 0 70% 0); transform: translateX(3px); }
            33% { clip-path: inset(60% 0 20% 0); transform: translateX(-3px); }
            66% { clip-path: inset(30% 0 50% 0); transform: translateX(2px); }
            100% { clip-path: inset(80% 0 5% 0); transform: translateX(-2px); }
        }

        /* 四面定位 */
        #front { transform: translateY(135px); }
        #back { transform: translateY(-135px) rotate(180deg); }
        #left { transform: translateX(-135px) rotate(90deg); }
        #right { transform: translateX(135px) rotate(-90deg); }

        /* ================= 整合互動區 ================= */
        #interaction-area {
            position: absolute; bottom: max(25px, env(safe-area-inset-bottom));
            width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100;
        }

        #main-subtitle {
            color: #00d2ff; font-size: 15px; font-weight: bold; margin-bottom: 12px;
            text-shadow: 0 0 8px rgba(0,210,255,0.8); text-align: center; padding: 0 20px;
        }

        .mic-btn {
            background-color: rgba(0, 210, 255, 0.1); color: #00d2ff; border: 1px solid #00d2ff;
            padding: 12px 35px; border-radius: 50px; font-size: 15px; font-weight: bold;
            backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); cursor: pointer;
            transition: 0.3s;
        }
        
        .mic-btn.active-loop { 
            background-color: rgba(255, 50, 50, 0.2); border-color: #ff4d4d; color: #ff4d4d; 
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.4); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        #gear-btn { position: absolute; top: 15px; right: 15px; color: #555; background: none; border: none; font-size: 24px; z-index: 110; cursor: pointer; }

        /* 設定面板 */
        #settings-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .settings-content { width: 85%; max-width: 360px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .api-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .api-group input { flex: 1; background: #000; border: 1px solid #333; color: #0f0; padding: 10px; border-radius: 8px; }
        .api-group button { background: #00d2ff; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
        .upload-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .upload-btn { background: #222; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        input[type="file"] { display: none; }
        .close-settings { width: 100%; margin-top: 20px; padding: 12px; background: #00d2ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <button id="gear-btn" onclick="toggleSettings(true)">⚙️</button>

    <div id="hologram-container">
        <div id="back" class="face-container">
            <div class="holo-wrapper">
                <div id="back-img" class="holo-image" style="--bg-img: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7')"></div>
                <div class="scan-line"></div>
                <div class="holo-sub"></div>
            </div>
        </div>
        <div id="left" class="face-container">
            <div class="holo-wrapper">
                <div id="left-img" class="holo-image" style="--bg-img: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7')"></div>
                <div class="scan-line"></div>
                <div class="holo-sub"></div>
            </div>
        </div>
        <div id="right" class="face-container">
            <div class="holo-wrapper">
                <div id="right-img" class="holo-image" style="--bg-img: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7')"></div>
                <div class="scan-line"></div>
                <div class="holo-sub"></div>
            </div>
        </div>
        <div id="front" class="face-container">
            <div class="holo-wrapper">
                <div id="front-img" class="holo-image" style="--bg-img: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7')"></div>
                <div class="scan-line"></div>
                <div class="holo-sub"></div>
            </div>
        </div>
    </div>

    <div id="interaction-area">
        <div id="main-subtitle">SYSTEM STANDBY...</div>
        <button id="mic-btn" class="mic-btn" onclick="toggleSystemLoop()">🎤 啟動雙向通訊</button>
    </div>

    <div id="settings-panel">
        <div class="settings-content">
            <h3 style="text-align:center; margin-top:0; color:#00d2ff;">CORE CONFIG</h3>
            <div class="api-group">
                <input type="password" id="api-input" placeholder="Gemini API Key">
                <button onclick="saveApiKey()">SAVE</button>
            </div>
            <div id="api-status" style="font-size:12px; text-align:center; color:#555; margin-bottom:15px;">WAITING FOR KEY...</div>

            <div class="upload-row"><span>FRONT</span><label for="up-front" class="upload-btn">UPLOAD</label><input type="file" id="up-front" accept="image/*"></div>
            <div class="upload-row"><span>BACK</span><label for="up-back" class="upload-btn">UPLOAD</label><input type="file" id="up-back" accept="image/*"></div>
            <div class="upload-row"><span>LEFT</span><label for="up-left" class="upload-btn">UPLOAD</label><input type="file" id="up-left" accept="image/*"></div>
            <div class="upload-row"><span>RIGHT</span><label for="up-right" class="upload-btn">UPLOAD</label><input type="file" id="up-right" accept="image/*"></div>
            
            <button class="close-settings" onclick="deploySystem()">DEPLOY SYSTEM (上線)</button>
        </div>
    </div>

    <script>
        const mainSubtitle = document.getElementById('main-subtitle');
        const sideSubtitles = document.querySelectorAll('.holo-sub');
        const apiStatus = document.getElementById('api-status');
        const apiInput = document.getElementById('api-input');
        const micBtn = document.getElementById('mic-btn');
        const holoImages = document.querySelectorAll('.holo-image');
        const container = document.getElementById('hologram-container');

        let API_KEY = localStorage.getItem('gemini_hologram_key') || '';
        if (API_KEY) { apiInput.value = API_KEY; apiStatus.innerText = "✅ API READY"; }

        function saveApiKey() { 
            const key = apiInput.value.trim();
            if (key) { API_KEY = key; localStorage.setItem('gemini_hologram_key', key); apiStatus.innerText = "✅ SAVED"; } 
        }

        function toggleSettings(show) { document.getElementById('settings-panel').style.display = show ? 'flex' : 'none'; }

        // ================= 更新字幕 =================
        function updateSubtitles(text) {
            mainSubtitle.innerText = text;
            sideSubtitles.forEach(sub => sub.innerText = text);
        }

        // ================= 音效模組 =================
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, ctx.currentTime);
                // 💡 增大單點確認音效：Gain 從 0.1 調高到 0.8
                gain.gain.setValueAtTime(0.8, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        function playDeployScanSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(50, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 4.5); 
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 4.5);
                
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 4.5);

                setTimeout(() => {
                    [300, 450, 600].forEach(freq => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = 'square';
                        o.frequency.setValueAtTime(freq, ctx.currentTime);
                        g.gain.setValueAtTime(0.15, ctx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(); o.stop(ctx.currentTime + 1.5);
                    });
                }, 4500);
            } catch(e) {}
        }

        // ================= 掃描與上傳邏輯 =================
        function deploySystem() {
            toggleSettings(false);
            updateSubtitles("INITIALIZING...");
            
            container.classList.add('scanning');
            playDeployScanSound();
            holoImages.forEach(img => img.classList.remove('idle-breathe'));
            
            let startTime = null;
            const duration = 4500;

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                document.documentElement.style.setProperty('--p', (progress * 100));

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    container.classList.remove('scanning');
                    holoImages.forEach(img => img.classList.add('idle-breathe'));
                    updateSubtitles("HOLOGRAM SYSTEM ONLINE");
                }
            }
            requestAnimationFrame(animate);
        }

        function setupUpload(inputId, imgId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) { 
                        document.getElementById(imgId).style.setProperty('--bg-img', `url('${e.target.result}')`); 
                        playBeep(); // 觸發大音量滴聲
                        document.querySelector(`label[for="${inputId}"]`).innerText = "SET";
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
        setupUpload('up-front', 'front-img'); setupUpload('up-back', 'back-img'); setupUpload('up-left', 'left-img'); setupUpload('up-right', 'right-img');

        // ================= 雙向通訊系統 =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isSystemActive = false; 
        let isWaitingForGemini = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            
            recognition.onstart = () => { updateSubtitles("LISTENING..."); };
            
            recognition.onresult = (e) => { 
                const text = e.results[0][0].transcript; 
                updateSubtitles(`User: ${text}`); 
                sendToGemini(text); 
            };

            recognition.onerror = (e) => {
                if(e.error !== 'no-speech') {
                    updateSubtitles(`Mic Error: ${e.error}`);
                    stopSystemLoop();
                }
            };

            recognition.onend = () => { 
                if (isSystemActive && !isWaitingForGemini) {
                    setTimeout(() => { try { recognition.start(); } catch(e){} }, 300);
                }
            };
        }

        function toggleSystemLoop() {
            if (!API_KEY) { updateSubtitles("ERROR: API KEY MISSING"); return; }
            
            isSystemActive = !isSystemActive; 

            if (isSystemActive) {
                micBtn.classList.add('active-loop');
                micBtn.innerText = "🛑 通訊連線中 (點擊關閉)";
                
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); 
                }
                isWaitingForGemini = false;
                try { recognition.start(); } catch(e){}

            } else {
                stopSystemLoop();
            }
        }

        function stopSystemLoop() {
            isSystemActive = false;
            isWaitingForGemini = false;
            micBtn.classList.remove('active-loop');
            micBtn.innerText = "🎤 啟動雙向通訊";
            updateSubtitles("SYSTEM STANDBY");
            recognition.stop();
        }

        // ================= Gemini API =================
        async function sendToGemini(userText) {
            isWaitingForGemini = true; 
            updateSubtitles("PROCESSING...");
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: "你是一個科幻的全息 AI 助理。講話極度簡短、專業。每次回覆不得超過 20 字。" }] }
                    })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    updateSubtitles(response.status === 503 ? "大腦忙碌中 (503)" : `SYS_ERR: ${response.status}`);
                    isWaitingForGemini = false;
                    return;
                }

                const replyText = data.candidates[0].content.parts[0].text;
                updateSubtitles(replyText);
                speak(replyText);
                
            } catch (error) {
                updateSubtitles("CONNECTION_FAIL");
                isWaitingForGemini = false;
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW';
                
                // 語音開始：啟動純淨方塊像素特效
                msg.onstart = () => holoImages.forEach(i => i.classList.add('is-talking'));
                
                // 語音結束：停止特效，循環聆聽
                msg.onend = () => {
                    holoImages.forEach(i => i.classList.remove('is-talking'));
                    isWaitingForGemini = false;
                    
                    if (isSystemActive) {
                        setTimeout(() => { try { recognition.start(); } catch(e){} }, 500);
                    }
                };
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
