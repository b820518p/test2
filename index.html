<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息艙 - 全方位掃描版</title>
    <style>
        /* ================= 1. 基礎設定 ================= */
        html, body {
            background-color: #000000 !important; color: #ffffff;
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif; touch-action: none;
        }

        #subtitle {
            position: absolute; top: max(30px, env(safe-area-inset-top)); 
            left: 0; width: 100%; font-size: 18px; text-align: center; z-index: 5;
            text-shadow: 0px 0px 10px #00d2ff; padding: 0 20px; box-sizing: border-box;
        }

        /* ================= 2. 投影陣列與「由下往上」遮罩動畫 ================= */
        #hologram-container { position: relative; width: 340px; height: 340px; transform-style: preserve-3d; }
        
        .holo-wrapper {
            position: absolute; width: 150px; height: 150px;
            top: 50%; left: 50%; margin-top: -75px; margin-left: -75px;
            /* 梯形裁切，確保投影比例正確 */
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
        }

        .holo-image {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center bottom;
            background-image: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
            opacity: 1;
            /* 💡 使用遮罩來做掃描，這會隨圖片旋轉，解決方向錯誤問題 */
            -webkit-mask-image: linear-gradient(to top, black 0%, black 0%, transparent 0%);
            mask-image: linear-gradient(to top, black 0%, black 0%, transparent 0%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            position: relative;
        }

        /* 💡 掃描時的雷射線特效 */
        .holo-image::after {
            content: "";
            position: absolute;
            left: 0; width: 100%; height: 2px;
            background: #00d2ff;
            box-shadow: 0 0 15px #00d2ff, 0 0 5px #fff;
            opacity: 0;
            bottom: 0;
        }

        /* 🎬 執行組裝動畫 */
        .assemble-anim {
            animation: scanReveal 2.5s forwards ease-in-out;
        }
        .assemble-anim::after {
            animation: laserMove 2.5s forwards ease-in-out;
        }

        /* 遮罩由下往上推 */
        @keyframes scanReveal {
            0% { -webkit-mask-size: 100% 0%; mask-size: 100% 0%; filter: brightness(3) blur(5px); }
            100% { -webkit-mask-size: 100% 100%; mask-size: 100% 100%; filter: brightness(1) blur(0px); }
        }

        /* 雷射線由下往上跑 */
        @keyframes laserMove {
            0% { bottom: 0%; opacity: 1; }
            90% { opacity: 1; }
            100% { bottom: 100%; opacity: 0; }
        }

        /* 平時呼吸動畫 */
        .idle-breathe { animation: float3D 4s infinite ease-in-out; }
        @keyframes float3D {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        /* 說話動態 */
        .is-talking { animation: talkingAnim 0.15s infinite !important; }
        @keyframes talkingAnim {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03); }
        }

        /* 四個面的絕對定位與旋轉 */
        #front-wrapper { transform: translateY(135px); }
        #back-wrapper { transform: translateY(-135px) rotate(180deg); }
        #left-wrapper { transform: translateX(-135px) rotate(90deg); }
        #right-wrapper { transform: translateX(135px) rotate(-90deg); }

        /* ================= 3. UI 佈局分離 ================= */
        #interaction-bar {
            position: absolute; bottom: max(20px, env(safe-area-inset-bottom));
            width: 100%; display: flex; justify-content: center; z-index: 100;
        }

        .mic-btn {
            background-color: rgba(0, 210, 255, 0.15); color: #00d2ff; border: 1px solid #00d2ff;
            padding: 14px 40px; border-radius: 50px; font-size: 16px; font-weight: bold;
            backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        .mic-btn.listening {
            background-color: rgba(255, 77, 77, 0.2); border-color: #ff4d4d; color: #ff4d4d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        #gear-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #444; font-size: 22px; z-index: 110; }

        /* 設定面板 */
        #settings-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .settings-content { width: 85%; max-width: 350px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .api-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .api-group input { flex: 1; background: #000; border: 1px solid #444; color: #0f0; padding: 10px; border-radius: 8px; }
        .api-group button { background: #00d2ff; color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .upload-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .upload-btn { background: #333; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        input[type="file"] { display: none; }
        .close-settings { width: 100%; margin-top: 20px; padding: 12px; background: #00d2ff; color: #000; border: none; border-radius: 8px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="subtitle">全息系統已就緒</div>
    <button id="gear-btn" onclick="toggleSettings(true)">⚙️</button>

    <div id="hologram-container">
        <div id="back-wrapper" class="holo-wrapper"><div id="back-img" class="holo-image"></div></div>
        <div id="left-wrapper" class="holo-wrapper"><div id="left-img" class="holo-image"></div></div>
        <div id="right-wrapper" class="holo-wrapper"><div id="right-img" class="holo-image"></div></div>
        <div id="front-wrapper" class="holo-wrapper"><div id="front-img" class="holo-image"></div></div>
    </div>

    <div id="interaction-bar">
        <button id="mic-btn" class="mic-btn" onclick="toggleListening()">🎤 啟動語音指令</button>
    </div>

    <div id="settings-panel">
        <div class="settings-content">
            <h3 style="text-align:center; margin-top:0; color:#00d2ff;">CORE SYSTEM</h3>
            <div class="api-group">
                <input type="password" id="api-input" placeholder="Gemini API Key">
                <button onclick="saveApiKey()">儲存</button>
            </div>
            <div id="api-status" style="font-size:12px; text-align:center; color:#888; margin-bottom:15px;">API KEY STATUS: UNKNOWN</div>

            <div class="upload-row"><span>FRONT</span><label for="up-front" class="upload-btn">UPLOAD</label><input type="file" id="up-front" accept="image/*"></div>
            <div class="upload-row"><span>BACK</span><label for="up-back" class="upload-btn">UPLOAD</label><input type="file" id="up-back" accept="image/*"></div>
            <div class="upload-row"><span>LEFT</span><label for="up-left" class="upload-btn">UPLOAD</label><input type="file" id="up-left" accept="image/*"></div>
            <div class="upload-row"><span>RIGHT</span><label for="up-right" class="upload-btn">UPLOAD</label><input type="file" id="up-right" accept="image/*"></div>
            
            <button class="close-settings" onclick="toggleSettings(false)">SAVE & CLOSE</button>
        </div>
    </div>

    <script>
        const subtitle = document.getElementById('subtitle');
        const apiStatus = document.getElementById('api-status');
        const apiInput = document.getElementById('api-input');
        const micBtn = document.getElementById('mic-btn');
        const holoImages = document.querySelectorAll('.holo-image');

        let API_KEY = localStorage.getItem('gemini_hologram_key') || '';
        if (API_KEY) { apiInput.value = API_KEY; apiStatus.innerText = "✅ API KEY: READY"; apiStatus.style.color = "#4caf50"; }

        function saveApiKey() { 
            const key = apiInput.value.trim();
            if (key) { API_KEY = key; localStorage.setItem('gemini_hologram_key', key); apiStatus.innerText = "✅ API KEY: SAVED"; apiStatus.style.color = "#4caf50"; } 
        }

        function toggleSettings(show) { document.getElementById('settings-panel').style.display = show ? 'flex' : 'none'; }

        // ================= 圖片上傳與動畫邏輯 =================
        function setupUpload(inputId, imgId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) { 
                        const img = document.getElementById(imgId);
                        img.style.backgroundImage = `url('${e.target.result}')`;
                        
                        // 重置動畫
                        img.classList.remove('idle-breathe', 'assemble-anim');
                        void img.offsetWidth; // 強制重繪
                        
                        // 1. 執行科技掃描組裝動畫
                        img.classList.add('assemble-anim');
                        
                        // 2. 2.5秒後切換為呼吸狀態
                        setTimeout(() => { 
                            img.classList.remove('assemble-anim');
                            img.classList.add('idle-breathe'); 
                        }, 2500);
                        
                        document.querySelector(`label[for="${inputId}"]`).innerText = "READY";
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
        setupUpload('up-front', 'front-img'); setupUpload('up-back', 'back-img'); setupUpload('up-left', 'left-img'); setupUpload('up-right', 'right-img');

        // ================= 語音與對話邏輯 =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.onstart = () => { isListening = true; micBtn.classList.add('listening'); micBtn.innerText = "🛑 SYSTEM LISTENING..."; };
            recognition.onresult = (e) => { const text = e.results[0][0].transcript; subtitle.innerText = `User: ${text}`; sendToGemini(text); };
            recognition.onerror = (e) => { subtitle.innerText = `Mic Error: ${e.error}`; stopListening(); };
            recognition.onend = () => { stopListening(); };
        }

        function stopListening() { isListening = false; micBtn.classList.remove('listening'); micBtn.innerText = "🎤 啟動語音指令"; }

        function toggleListening() {
            // 💡 點擊瞬間同時啟動語音合成預讀，這能解鎖 iOS 的聲音權限
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const unlock = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(unlock);
            }
            if (isListening) recognition.stop(); else recognition.start();
        }

        async function sendToGemini(userText) {
            if (!API_KEY) { subtitle.innerText = "ERROR: API KEY MISSING"; return; }
            subtitle.innerText = "ANALYZING COMMAND...";
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: "你是一個科幻的全息 AI 助理。講話簡短、專業且有禮。字數控制在 25 字內。" }] }
                    })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    subtitle.innerText = `ERR: ${response.status} - ${data.error ? data.error.message.substring(0, 20) : 'SERVER BUSY'}`;
                    return;
                }

                const replyText = data.candidates[0].content.parts[0].text;
                subtitle.innerText = replyText;
                speak(replyText);
                
            } catch (error) {
                subtitle.innerText = "NETWORK ERROR: UNABLE TO CONNECT";
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW';
                msg.rate = 1.1;
                msg.onstart = () => holoImages.forEach(i => i.classList.add('is-talking'));
                msg.onend = () => holoImages.forEach(i => i.classList.remove('is-talking'));
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
