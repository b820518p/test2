<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 全息艙 - 終極穩定版</title>
    <style>
        :root { --scan-p: 0%; --laser-y: 100%; }

        html, body {
            background-color: #000000 !important; color: #ffffff;
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace; touch-action: none;
        }

        /* 頂部狀態字幕 */
        #subtitle {
            position: absolute; top: max(30px, env(safe-area-inset-top)); 
            width: 100%; text-align: center; z-index: 10;
            color: #00d2ff; font-size: 16px; font-weight: bold;
            text-shadow: 0 0 10px rgba(0,210,255,0.7);
            padding: 0 20px; box-sizing: border-box;
        }

        /* 全息投影核心容器 */
        #hologram-container { position: relative; width: 360px; height: 360px; transform-style: preserve-3d; }
        
        .holo-wrapper {
            position: absolute; width: 160px; height: 160px;
            top: 50%; left: 50%; margin-top: -80px; margin-left: -80px;
            /* 四面金字塔專用梯形裁切 */
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        /* 圖片本體：使用 Mask 遮罩實現穩定掃描 */
        .holo-image {
            width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center bottom;
            background-image: url('data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
            
            /* 💡 核心修正：利用 -webkit-mask 確保四面同步揭露 */
            -webkit-mask-image: linear-gradient(to top, black var(--scan-p), transparent var(--scan-p));
            mask-image: linear-gradient(to top, black var(--scan-p), transparent var(--scan-p));
            
            filter: brightness(1.2) contrast(1.1);
            position: relative;
        }

        /* 雷射掃描線 */
        .laser-line {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: #00d2ff;
            box-shadow: 0 0 15px #00d2ff, 0 0 2px #fff;
            bottom: var(--scan-p); /* 跟隨遮罩進度 */
            opacity: 0;
            z-index: 5;
        }

        .scanning .laser-line { opacity: 1; }

        /* 動畫：平時呼吸 */
        .idle-breathe { animation: float3D 4s infinite ease-in-out; }
        @keyframes float3D {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* 講話動態 */
        .is-talking { animation: talkVibrate 0.1s infinite; }
        @keyframes talkVibrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.02) brightness(1.3); }
        }

        /* 四面定位 */
        #front { transform: translateY(140px); }
        #back { transform: translateY(-140px) rotate(180deg); }
        #left { transform: translateX(-140px) rotate(90deg); }
        #right { transform: translateX(140px) rotate(-90deg); }

        /* ================= UI 介面 ================= */
        #interaction-bar {
            position: absolute; bottom: max(30px, env(safe-area-inset-bottom));
            width: 100%; display: flex; justify-content: center; z-index: 100;
        }

        .mic-btn {
            background-color: rgba(0, 210, 255, 0.1); color: #00d2ff;
            border: 1px solid #00d2ff; padding: 12px 35px; border-radius: 50px;
            font-size: 15px; font-weight: bold; letter-spacing: 1px;
            backdrop-filter: blur(10px); transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }
        .mic-btn.listening { background-color: rgba(255, 0, 0, 0.2); border-color: #ff4d4d; color: #ff4d4d; }

        #gear-btn { position: absolute; top: 15px; right: 15px; color: #333; background: none; border: none; font-size: 24px; }

        /* 設定面板 */
        #settings-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .settings-content { width: 85%; max-width: 360px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .api-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .api-group input { flex: 1; background: #000; border: 1px solid #333; color: #0f0; padding: 12px; border-radius: 8px; font-size: 14px; }
        .api-group button { background: #00d2ff; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
        
        .upload-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; color: #888; }
        .upload-btn { background: #222; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        input[type="file"] { display: none; }
        .close-settings { width: 100%; margin-top: 20px; padding: 12px; background: #00d2ff; color: #000; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="subtitle">SYSTEM ON STANDBY</div>
    <button id="gear-btn" onclick="toggleSettings(true)">⚙️</button>

    <div id="hologram-container">
        <div id="back" class="holo-wrapper"><div id="back-img" class="holo-image"></div><div class="laser-line"></div></div>
        <div id="left" class="holo-wrapper"><div id="left-img" class="holo-image"></div><div class="laser-line"></div></div>
        <div id="right" class="holo-wrapper"><div id="right-img" class="holo-image"></div><div class="laser-line"></div></div>
        <div id="front" class="holo-wrapper"><div id="front-img" class="holo-image"></div><div class="laser-line"></div></div>
    </div>

    <div id="interaction-bar">
        <button id="mic-btn" class="mic-btn" onclick="toggleListening()">🎤 INITIATE VOICE COMMAND</button>
    </div>

    <div id="settings-panel">
        <div class="settings-content">
            <h3 style="text-align:center; margin-top:0; color:#00d2ff; letter-spacing: 2px;">CORE CONFIG</h3>
            <div class="api-group">
                <input type="password" id="api-input" placeholder="Enter Gemini API Key">
                <button onclick="saveApiKey()">SAVE</button>
            </div>
            <div id="api-status" style="font-size:12px; text-align:center; color:#555; margin-bottom:15px;">WAITING FOR API KEY...</div>

            <div class="upload-row"><span>FRONT VIEW</span><label for="up-front" class="upload-btn">UPLOAD</label><input type="file" id="up-front" accept="image/*"></div>
            <div class="upload-row"><span>BACK VIEW</span><label for="up-back" class="upload-btn">UPLOAD</label><input type="file" id="up-back" accept="image/*"></div>
            <div class="upload-row"><span>LEFT VIEW</span><label for="up-left" class="upload-btn">UPLOAD</label><input type="file" id="up-left" accept="image/*"></div>
            <div class="upload-row"><span>RIGHT VIEW</span><label for="up-right" class="upload-btn">UPLOAD</label><input type="file" id="up-right" accept="image/*"></div>
            
            <button class="close-settings" onclick="toggleSettings(false)">DEPlOY SYSTEM</button>
        </div>
    </div>

    <script>
        const subtitle = document.getElementById('subtitle');
        const apiStatus = document.getElementById('api-status');
        const apiInput = document.getElementById('api-input');
        const micBtn = document.getElementById('mic-btn');
        const holoImages = document.querySelectorAll('.holo-image');
        const container = document.getElementById('hologram-container');

        let API_KEY = localStorage.getItem('gemini_hologram_key') || '';
        if (API_KEY) { apiInput.value = API_KEY; apiStatus.innerText = "✅ API STATUS: ONLINE"; apiStatus.style.color = "#4caf50"; }

        function saveApiKey() { 
            const key = apiInput.value.trim();
            if (key) { API_KEY = key; localStorage.setItem('gemini_hologram_key', key); apiStatus.innerText = "✅ API STATUS: SAVED"; } 
        }

        function toggleSettings(show) { document.getElementById('settings-panel').style.display = show ? 'flex' : 'none'; }

        // ================= 1. 核心掃描動畫：物理鎖死由下往上 =================
        function triggerScan() {
            container.classList.add('scanning');
            let progress = 0;
            holoImages.forEach(img => img.classList.remove('idle-breathe'));
            
            // 使用 requestAnimationFrame 讓動畫在手機上更順暢
            function animate() {
                progress += 1.5; // 組裝速度
                document.documentElement.style.setProperty('--scan-p', progress + '%');
                
                if (progress < 100) {
                    requestAnimationFrame(animate);
                } else {
                    container.classList.remove('scanning');
                    holoImages.forEach(img => img.classList.add('idle-breathe'));
                }
            }
            requestAnimationFrame(animate);
        }

        function setupUpload(inputId, imgId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) { 
                        document.getElementById(imgId).style.backgroundImage = `url('${e.target.result}')`; 
                        triggerScan(); 
                        document.querySelector(`label[for="${inputId}"]`).innerText = "READY";
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
        setupUpload('up-front', 'front-img'); setupUpload('up-back', 'back-img'); setupUpload('up-left', 'left-img'); setupUpload('up-right', 'right-img');

        // ================= 2. 語音辨識與音訊解鎖 =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.onstart = () => { isListening = true; micBtn.classList.add('listening'); micBtn.innerText = "🛑 SYSTEM LISTENING..."; };
            recognition.onresult = (e) => { const text = e.results[0][0].transcript; subtitle.innerText = `User: ${text}`; sendToGemini(text); };
            recognition.onend = () => { isListening = false; micBtn.classList.remove('listening'); micBtn.innerText = "🎤 INITIATE VOICE COMMAND"; };
        }

        function toggleListening() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); // 強制解鎖
            }
            if (isListening) recognition.stop(); else recognition.start();
        }

        // ================= 3. Gemini API 呼叫 (精準除錯版) =================
        async function sendToGemini(userText) {
            if (!API_KEY) { subtitle.innerText = "ERROR: API KEY MISSING"; return; }
            subtitle.innerText = "PROCESSING DATA...";
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: "你是一個科幻的全息 AI 助理。講話極度簡短、專業。每次回覆不得超過 20 字。" }] }
                    })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    // 🚨 直接顯示錯誤原因，如果是 503 代表 Google 伺服器掛了
                    subtitle.innerText = `SYS_ERR: ${response.status} ${data.error ? data.error.message.substring(0, 20) : ''}`;
                    return;
                }

                const replyText = data.candidates[0].content.parts[0].text;
                subtitle.innerText = replyText;
                speak(replyText);
                
            } catch (error) {
                subtitle.innerText = "CONNECTION_FAIL: TIMEOUT";
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-TW';
                msg.rate = 1.2; // 稍微快一點更有科技感
                msg.onstart = () => holoImages.forEach(i => i.classList.add('is-talking'));
                msg.onend = () => holoImages.forEach(i => i.classList.remove('is-talking'));
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
